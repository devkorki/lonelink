<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LAN Share — Login</title>
  <style>
    * { box-sizing: border-box; }
    :root {
      --bg: #f5f6f8;
      --card: #ffffff;
      --border: #e4e7ec;
      --text: #1a1d24;
      --muted: #5b6473;
      --accent: #2563eb;
      --accent-hover: #1d4ed8;
      --danger: #dc2626;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0f1115; --card: #1a1d24; --border: #2a2f3a;
        --text: #e6e8ec; --muted: #8b92a3;
        --accent: #4f8cff; --accent-hover: #6b9eff; --danger: #ef4444;
      }
    }
    body {
      margin: 0; min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      background: var(--bg); color: var(--text);
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 1.75rem 1.5rem 1.5rem;
      width: 100%;
      max-width: 360px;
      text-align: center;
      margin: 1rem;
    }
    h1 { margin: 0 0 0.25rem; font-size: 1.25rem; }
    p { color: var(--muted); margin: 0 0 1rem; font-size: 0.95rem; }
    form { display: flex; flex-direction: column; gap: 0.75rem; }
    input[type="password"] {
      width: 100%;
      padding: 0.6rem 0.75rem;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--bg);
      color: var(--text);
      font-size: 1rem;
      font-family: inherit;
    }
    input[type="password"]:focus { outline: none; border-color: var(--accent); }
    button {
      padding: 0.55rem 0.9rem;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 0.95rem;
      cursor: pointer;
      font-family: inherit;
    }
    button:hover { background: var(--accent-hover); }
    .error {
      color: var(--danger);
      font-size: 0.9rem;
      margin-top: 0.5rem;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>LAN Share</h1>
    <p>Enter the password to continue.</p>
    <form action="/login" method="POST">
      <input type="password" name="password" placeholder="Password" autofocus required />
      <button type="submit">Sign in</button>
    </form>
    <p id="error" class="error" hidden>Wrong password.</p>
  </main>
  <script>
    if (location.search.includes('error=1')) {
      document.getElementById('error').hidden = false;
    }
  </script>
</body>
</html>
